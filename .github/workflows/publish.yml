name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      # Trusted Publishing (OIDC) — no token. Trusted Publisher configured on
      # npmjs.com; the bootstrap NPM_TOKEN has been revoked.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
